<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ GWA Calculator ✦</title>
    <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden; color: #fff;
            background-color: #001f3f;
        }

        .video-bg {
            position: fixed; top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            z-index: -1; transform: translate(-50%, -50%);
            object-fit: cover; filter: brightness(0.5) saturate(1.2);
            pointer-events: none;
        }

        @media (orientation: portrait) { 
            #bg-portrait { display: block !important; } 
            #bg-landscape { display: none !important; }
        }
        @media (orientation: landscape) { 
            #bg-landscape { display: block !important; } 
            #bg-portrait { display: none !important; }
        }

        .container {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; width: 100%; padding: 15px;
            box-sizing: border-box;
        }

        .calc-card {
            background: rgba(0, 31, 63, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid #ff69b4;
            padding: 1.5rem; /* Reduced padding for mobile */
            border-radius: 20px;
            width: 100%; max-width: 380px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            text-align: center;
            position: relative;
        }

        /* Responsive Title Size */
        h1 { 
            font-family: 'Pirata One', system-ui; margin: 0 0 20px 0;
            color: #ff69b4; 
            font-size: clamp(1.8rem, 8vw, 2.5rem); /* Scales with screen width */
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
            white-space: nowrap; /* Keeps it on one line */
        }

        .label-grid {
            display: grid; grid-template-columns: 1.2fr 1fr 40px;
            gap: 8px; margin-bottom: 8px; color: #00ffff;
            font-size: 0.7rem; text-transform: uppercase;
        }

        .row {
            display: grid; grid-template-columns: 1.2fr 1fr 40px;
            gap: 8px; margin-bottom: 10px;
        }

        input {
            width: 100%; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.4); color: #fff;
            border-radius: 10px; text-align: center; font-size: 0.9rem;
            box-sizing: border-box;
        }

        button { cursor: pointer; border: none; font-family: 'Pirata One', cursive; transition: 0.3s; }

        .btn-add {
            width: 100%; padding: 12px; background: #ff69b4;
            color: white; font-size: 1.3rem; border-radius: 12px; margin-top: 10px;
        }

        .btn-pdf {
            width: 100%; padding: 10px; 
            background: linear-gradient(90deg, #ff69b4, #0077be);
            color: white; font-size: 1.1rem; border-radius: 12px; margin-top: 10px;
        }

        .btn-clear {
            width: 100%; padding: 8px; background: transparent;
            color: #ff69b4; border: 1px solid #ff69b4;
            border-radius: 10px; margin-top: 10px; font-size: 0.8rem;
        }

        .btn-remove { background: rgba(255, 255, 255, 0.1); color: #ff69b4; border-radius: 8px; font-family: Arial; font-weight: bold; }

        .result-section { margin-top: 20px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 15px; }
        #gwa-display { font-size: 3rem; color: #fff; text-shadow: 0 0 20px #00ffff; font-weight: 900; }
    </style>
</head>
<body>

    <video id="bg-portrait" class="video-bg" autoplay muted loop playsinline>
        <source src="oceanp.mp4" type="video/mp4">
    </video>
    <video id="bg-landscape" class="video-bg" autoplay muted loop playsinline>
        <source src="oceanl.mp4" type="video/mp4">
    </video>

    <div class="container">
        <div class="calc-card" id="export-area">
            <h1>✦ GWA CALCULATOR ✦</h1>
            
            <div class="label-grid">
                <span>Grade</span>
                <span>Units</span>
                <span></span>
            </div>

            <div id="grades-container"></div>

            <button class="btn-add" onclick="addRow()">+ Add Course</button>
            <button class="btn-pdf" onclick="downloadPDF()">⬇ Download PDF</button>
            <button class="btn-clear" onclick="clearAll()">Clear All</button>

            <div class="result-section">
                <span id="gwa-display">0.00</span>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('grades-container');
        const display = document.getElementById('gwa-display');

        function addRow() {
            const row = document.createElement('div');
            row.className = 'row';
            row.innerHTML = `
                <input type="number" step="0.01" class="grade-input" placeholder="1.0" oninput="calculateGWA()">
                <input type="number" step="0.5" class="unit-input" placeholder="3" oninput="calculateGWA()">
                <button class="btn-remove" onclick="removeRow(this)">✕</button>
            `;
            container.appendChild(row);
        }

        function removeRow(btn) {
            btn.parentElement.remove();
            calculateGWA();
        }

        function calculateGWA() {
            const grades = document.querySelectorAll('.grade-input');
            const units = document.querySelectorAll('.unit-input');
            let totalWeightedPoints = 0;
            let totalUnits = 0;

            grades.forEach((gradeInput, index) => {
                const g = parseFloat(gradeInput.value);
                const u = parseFloat(units[index].value);
                if (!isNaN(g) && !isNaN(u)) {
                    totalWeightedPoints += (g * u);
                    totalUnits += u;
                }
            });

            if (totalUnits > 0) {
                display.innerText = (totalWeightedPoints / totalUnits).toFixed(2);
            } else {
                display.innerText = "0.00";
            }
        }

        function clearAll() {
            container.innerHTML = '';
            display.innerText = "0.00";
            addRow(); 
        }

        function downloadPDF() {
            const element = document.getElementById('export-area');
            const opt = {
                margin: 0.2,
                filename: 'My_GWA.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, useCORS: true, backgroundColor: '#001f3f' },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            const buttons = element.querySelectorAll('button');
            buttons.forEach(b => b.style.display = 'none');

            html2pdf().set(opt).from(element).save().then(() => {
                buttons.forEach(b => b.style.display = 'block');
            });
        }

        // Fix video for iOS/Safari
        window.addEventListener('touchstart', () => {
            document.querySelectorAll('video').forEach(v => v.play());
        }, {once: true});

        window.onload = addRow;
    </script>
</body>
</html>
